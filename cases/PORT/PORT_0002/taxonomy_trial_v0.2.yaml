case_id: PORT_0002
trial_version: "0.2"
status: admitted_common_core_case
candidate_primary_pool: portability
dataset_line_candidate: common-core

context:
  purpose: >
    This case is derived from a PARROT BIRD portability seed and is used to
    validate the external portability seed-to-case pipeline.
  note: >
    PORT_0002 has now passed admission review and is treated as an admitted
    external common-core portability case. The case records PostgreSQL
    source-side validation plus MySQL and Spark target-side positive and
    negative rewrite validation.

sql_feature_tags:
  - date_time_function

rewrite_opportunity_tags:
  - dialect_adaptation

plan_operator_tags:
  status: provisional_pg_mysql_spark_split
  observed_in_postgres:
    - scan
    - aggregate
  observed_in_mysql:
    - scan
  observed_in_spark:
    - scan
    - aggregate
    - project

workload_realism_tags: []

portability_tags:
  - datetime_semantics_gap

review_notes:
  - PORT_0002 is sourced from PARROT benchmark/BIRD/pg_res.json entry 0.
  - The source query uses PostgreSQL-style TO_CHAR(CAST(... AS TIMESTAMP), 'YYYY').
  - The MySQL positive rewrite uses DATE_FORMAT(..., '%Y') and preserves the source result.
  - The MySQL negative rewrite uses inclusive end-of-year bounds and changes the result.
  - The Spark positive rewrite uses Spark-compatible date_format(..., 'yyyy') and preserves the source result.
  - The Spark negative rewrite uses inclusive end-of-year bounds and changes the result.
  - This case has now passed PORT_0002_ADMISSION_REVIEW_v1 and is treated as an admitted external common-core case.

expected_outputs:
  pg_source:
    - "1.5"
  mysql_positive:
    - "1.5"
  mysql_negative:
    - "1"
  spark_positive:
    - "1.5"
  spark_negative:
    - "1.0"

