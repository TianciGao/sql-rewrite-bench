case_id: PORT_0002
trial_version: "0.2"
status: provisional_trial_labeled
candidate_primary_pool: portability
dataset_line_candidate: common-core_candidate

context:
  purpose: >
    This case is derived from a PARROT BIRD portability seed and is used to
    validate the external portability seed-to-case pipeline.
  note: >
    PORT_0002 currently has PostgreSQL source execution and MySQL positive
    and negative rewrite validation on the witness dataset. It is currently
    under common-core candidate review rather than ordinary external staging.

sql_feature_tags:
  - date_time_function

rewrite_opportunity_tags:
  - dialect_adaptation

plan_operator_tags:
  status: provisional_pg_mysql_split
  observed_in_postgres:
    - scan
    - aggregate
  observed_in_mysql:
    - scan

workload_realism_tags: []

portability_tags:
  - datetime_semantics_gap

review_notes:
  - PORT_0002 is sourced from PARROT benchmark/BIRD/pg_res.json entry 0.
  - The source query uses PostgreSQL-style TO_CHAR(CAST(... AS TIMESTAMP), 'YYYY').
  - The positive rewrite candidate uses MySQL-style DATE_FORMAT(..., '%Y').
  - The negative rewrite uses inclusive end-of-year range bounds and therefore drops late-day records such as 2010-12-31 23:59:59.
  - On the witness dataset, PostgreSQL source.sql and MySQL rewrite_pos_01.sql both return 1.5, while MySQL rewrite_neg_01.sql returns 1.

expected_outputs:
  pg_source:
    - "1.5"
  mysql_positive:
    - "1.5"
  mysql_negative:
    - "1"

evidence:
  raw_record: cases/PORT/PORT_0002/provenance/parrot_bird_pg_res_entry0.json
  provenance_notes: cases/PORT/PORT_0002/provenance/parrot_bird_pg_res_entry0_notes.txt
  frozen_source: cases/PORT/PORT_0002/source.sql
  positive_candidate: cases/PORT/PORT_0002/rewrite_pos_01.sql
  negative_candidate: cases/PORT/PORT_0002/rewrite_neg_01.sql
  data_profile: cases/PORT/PORT_0002/data_profile.json
  pg_source_plan: runs/port_0002/plans/pg/source.json
  mysql_positive_plan: runs/port_0002/plans/mysql/rewrite_pos_01.json
  mysql_negative_plan: runs/port_0002/plans/mysql/rewrite_neg_01.json
  mysql_positive_result: runs/port_0002/mysql/rewrite_pos_01.tsv
  mysql_negative_result: runs/port_0002/mysql/rewrite_neg_01.tsv
