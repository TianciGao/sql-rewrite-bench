type: value_normalized_result_equivalence_checker
status: pg_witness_validated
normalization:
  sort_rows: true
  trim_whitespace: true
  normalize_numeric_format: true
  normalize_null: true
inputs:
  source: source.sql
  positive_rewrite: rewrite_pos_01.sql
  negative_rewrite: rewrite_neg_01.sql
schema_profile:
  pg_ddl: schema/ddl_pg.sql
  mysql_ddl: schema/ddl_mysql.sql
  spark_ddl: schema/ddl_spark.sql
  data_profile: data_profile.json
expectations:
  equal:
    - source.sql
    - rewrite_pos_01.sql
  not_equal:
    - source.sql
    - rewrite_neg_01.sql
expected_results: {}
validation_evidence:
  - engine: postgres
    result_check: runs/pg/result_check.json
    source_result: runs/pg/source.tsv
    positive_result: runs/pg/rewrite_pos_01.tsv
    negative_result: runs/pg/rewrite_neg_01.tsv
notes:
  - PostgreSQL witness validation shows source and positive outputs match.
  - PostgreSQL witness validation shows source and negative outputs differ.
  - No MySQL/Spark validation, plan evidence, admission claim, or promotion claim is implied.
