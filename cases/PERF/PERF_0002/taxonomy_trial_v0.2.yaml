case_id: PERF_0002
trial_version: "0.2"
status: provisional_trial_labeled
candidate_primary_pool: performance
dataset_line_candidate: common-core

context:
  purpose: >
    This case is derived from a TPC-DS seed and is used to validate the
    first external performance-oriented seed-to-case pipeline.
  note: >
    PERF_0002 is now source-validated on PostgreSQL, MySQL, and Spark.
    Taxonomy entries below should still be treated as provisional until
    rewrite variants are completed.

