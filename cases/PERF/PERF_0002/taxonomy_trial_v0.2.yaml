case_id: PERF_0002
trial_version: "0.2"
status: provisional_trial_labeled
candidate_primary_pool: performance
dataset_line_candidate: common-core_candidate

context:
  purpose: >
    This case is derived from a TPC-DS seed and is used to validate the
    first external performance-oriented seed-to-case pipeline.
  note: >
    PERF_0002 is now validated across PostgreSQL, MySQL, and Spark for
    source, positive rewrite, and negative rewrite. Taxonomy entries below
    should still be treated as provisional until release-level admission.

sql_feature_tags:
  - window_function
  - subquery_in_from

rewrite_opportunity_tags: []

plan_operator_tags:
  status: provisional_pg_mysql_spark_split
  observed_in_postgres:
    - scan
    - join
    - aggregate
    - window
    - filter
    - sort
    - limit
    - subquery
  observed_in_mysql:
    - scan
    - join
    - aggregate
    - window
    - filter
    - sort
    - subquery
    - materialize
  observed_in_spark:
    - scan
    - filter
    - project
    - join
    - aggregate
    - window
    - sort
    - exchange
    - limit

workload_realism_tags:
  - classic_analytical_baseline

portability_tags:
  - limit_fetch_gap

review_notes:
  - PERF_0002 is derived from TPC-DS query53.tpl.
  - The materialized seed contained TOP syntax and was normalized into a LIMIT-based common-core-friendly source candidate.
  - The positive rewrite replaces the CASE-based outer predicate with an equivalent direct inequality.
  - The negative rewrite tightens the anomaly threshold from 0.1 to 0.5 and changes the result set.
  - PostgreSQL, MySQL, and Spark all agree on source-versus-positive equivalence and source-versus-negative non-equivalence.
  - Numeric formatting differs slightly across engines, so cross-engine comparison should be value-normalized rather than raw-string-based.

