- The negative rewrite tightens the complete_cast status filter from complete to complete+verified.
- PostgreSQL validation shows source == positive and source != negative.
- MySQL source-versus-positive equivalence and source-versus-negative non-equivalence
  are now observed on the required-table-only JOB/IMDB subset.
- This case is now stronger than a PG-only draft, but still lacks Spark closure.
