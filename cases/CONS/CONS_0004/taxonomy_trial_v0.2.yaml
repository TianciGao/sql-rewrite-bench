review_notes:
  - CONS_0004 is sourced from VeriEQL Calcite-397 / 362.
  - The source query uses GROUP BY + HAVING COUNT(*) > 3.
  - The positive rewrite materializes the aggregate first and then filters on the derived count.
  - The negative rewrite tightens the threshold from > 3 to > 4.
  - PostgreSQL witness validation shows source == positive and source != negative.

