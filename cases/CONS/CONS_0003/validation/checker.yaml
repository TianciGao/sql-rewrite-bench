type: result_equivalence_checker

normalization:
  sort_rows: true
  trim_whitespace: true
  normalize_tabs: true

expectations:
  equal:
    - source.sql
    - rewrite_pos_01.sql
  not_equal:
    - source.sql
    - rewrite_neg_01.sql

expected_results:
  source: "10\t2\n20\t1"
  rewrite_pos_01: "10\t2\n20\t1"
  rewrite_neg_01: "10\t3\n20\t2"
