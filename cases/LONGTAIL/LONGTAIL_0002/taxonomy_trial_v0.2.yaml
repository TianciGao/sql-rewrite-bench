review_notes:
- LONGTAIL_0002 is sourced from SQLStorm StackOverflow query 12033.
- The positive rewrite removes the CTE wrapper and rewrites the same logic using inline
  derived tables.
- The negative rewrite strengthens the badge-side LEFT JOIN into an INNER JOIN.
- The witness dataset includes Dave, who has posts but no badges, making the negative
  rewrite observably non-equivalent.
- MySQL source-versus-positive equivalence and source-versus-negative non-equivalence
  are now observed on the witness dataset.
- Spark source-versus-positive equivalence and source-versus-negative non-equivalence
  are now observed on the witness dataset.
- Cross-engine comparison should be treated as value-normalized rather than raw-string-based
  because NULL and numeric formatting differ slightly across engines.
